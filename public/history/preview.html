<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chrono — History deck (100 cards)</title>
<style>
 :root{color-scheme:dark}
 body{margin:0;padding:26px 30px;background:#0d0f0a;color:#e8e2d0;font-family:Georgia,'Times New Roman',serif}
 h1{color:#cda349;font-weight:700;margin:0 0 4px}
 .sub{opacity:.7;margin:0 0 18px}
 .bar{display:flex;gap:12px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
 .tg{background:#1a1f16;border:1px solid rgba(205,163,73,.5);color:#cda349;font:600 13px Georgia,serif;padding:9px 16px;border-radius:10px;cursor:pointer}
 .tg:hover{background:rgba(205,163,73,.14)}
 .count{opacity:.6;font-size:13px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:22px}
 .hc{position:relative;margin:0;aspect-ratio:240/344;border-radius:14px;overflow:hidden;
     border:1px solid rgba(205,163,73,.45);box-shadow:0 16px 36px -16px #000,0 0 0 6px rgba(205,163,73,.08) inset}
 .hc img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(1) contrast(1.06) brightness(.94);transition:filter .25s}
 .duo{position:absolute;inset:0;mix-blend-mode:color;opacity:.5;background:linear-gradient(180deg,#e6c069,#7a5a23 55%,#2a1e0c);transition:opacity .25s}
 .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,4,.3),transparent 28%,transparent 55%,rgba(10,8,4,.9) 92%)}
 .yr{position:absolute;top:9px;right:12px;color:#f0e2b3;font:700 19px Georgia,serif;text-shadow:0 2px 10px #000,0 0 18px rgba(0,0,0,.6)}
 .ti{position:absolute;left:14px;right:14px;bottom:14px;color:#f0e2b3;font:700 17px Georgia,serif;text-shadow:0 2px 12px #000,0 0 18px rgba(0,0,0,.6);line-height:1.08}
 .grid.raw .hc img{filter:none}
 .grid.raw .duo{opacity:0}
</style></head><body>
